# ============================================
# Nixpacks Configuration for Coolify
# Maktabati E-commerce - Next.js 16 + Prisma
# ============================================

[phases.setup]

[phases.install]
cmd = "npm ci"

[phases.build]
cmd = """
prisma generate && \
next build
"""

[start]
cmd = "npm run start"

[variables]
NODE_ENV = "production"
