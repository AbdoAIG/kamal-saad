# ============================================
# Docker Compose for Kamal Saad E-commerce
# Production deployment on Hetzner
# ============================================

services:
  # ============================================
  # Next.js Application
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kamal-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://kamal:${DB_PASSWORD}@pgbouncer:6432/kamal_saad
      - DIRECT_DATABASE_URL=postgresql://kamal:${DB_PASSWORD}@db:5432/kamal_saad
      - REDIS_URL=redis://redis:6379
      - REDIS_TOKEN=
      - AUTH_SECRET=${AUTH_SECRET}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - PAYMOB_API_KEY=${PAYMOB_API_KEY}
      - PAYMOB_CARD_INTEGRATION_ID=${PAYMOB_CARD_INTEGRATION_ID}
      - PAYMOB_WALLET_INTEGRATION_ID=${PAYMOB_WALLET_INTEGRATION_ID}
      - PAYMOB_KIOSK_INTEGRATION_ID=${PAYMOB_KIOSK_INTEGRATION_ID}
      - PAYMOB_IFRAME_ID=${PAYMOB_IFRAME_ID}
      - PAYMOB_HMAC_SECRET=${PAYMOB_HMAC_SECRET}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kamal-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # PostgreSQL Database with PgBouncer
  # ============================================
  db:
    image: postgres:16-alpine
    container_name: kamal-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kamal
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: kamal_saad
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kamal-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kamal -d kamal_saad"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # PgBouncer - Connection Pooler
  # Sits between app and database to manage connections efficiently
  # Handles thousands of concurrent visitors with connection pooling
  # ============================================
  pgbouncer:
    image: edoburu/pgbouncer
    container_name: kamal-pgbouncer
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgres://kamal:${DB_PASSWORD}@db:5432/kamal_saad"
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 1000
      PGBOUNCER_DEFAULT_POOL_SIZE: 20
      PGBOUNCER_MIN_POOL_SIZE: 5
      PGBOUNCER_RESERVE_POOL_SIZE: 5
      PGBOUNCER_RESERVE_POOL_TIMEOUT: 3
      PGBOUNCER_SERVER_IDLE_TIMEOUT: 600
      PGBOUNCER_SERVER_LIFETIME: 3600
      PGBOUNCER_SERVER_CONNECT_TIMEOUT: 15
      PGBOUNCER_SERVER_RESET_QUERY: "DISSET ALL"
    ports:
      - "6432:6432"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - kamal-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 -U kamal"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis Cache - For distributed caching & rate limiting
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: kamal-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - kamal-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Nginx Reverse Proxy
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: kamal-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - kamal-network

  # ============================================
  # Certbot for SSL Certificates (Let's Encrypt)
  # ============================================
  certbot:
    image: certbot/certbot
    container_name: kamal-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - kamal-network

networks:
  kamal-network:
    driver: bridge

volumes:
  redis_data:
  postgres_data:
