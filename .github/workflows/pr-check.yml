name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  NODE_VERSION: '20'
  DATABASE_URL: 'file:./test.db'
  AUTH_SECRET: 'test-secret-key-for-ci-testing'
  NEXTAUTH_SECRET: 'test-secret-key-for-ci-testing'

jobs:
  # ============================================
  # Job 1: PR Summary
  # ============================================
  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate PR Summary
        run: |
          echo "## 📋 Pull Request Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Changed Files" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          git diff --name-only origin/${{ github.base_ref }}...HEAD >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Statistics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Files Changed | $(git diff --name-only origin/${{ github.base_ref }}...HEAD | wc -l) |" >> $GITHUB_STEP_SUMMARY
          echo "| Additions | $(git diff --shortstat origin/${{ github.base_ref }}...HEAD | grep -o '[0-9]* insertion' | grep -o '[0-9]*') |" >> $GITHUB_STEP_SUMMARY
          echo "| Deletions | $(git diff --shortstat origin/${{ github.base_ref }}...HEAD | grep -o '[0-9]* deletion' | grep -o '[0-9]*') |" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Job 2: Quick Lint & Type Check
  # ============================================
  quick-check:
    name: Quick Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: ESLint Check
        run: npm run lint
        continue-on-error: true

  # ============================================
  # Job 3: Run Affected Tests
  # ============================================
  affected-tests:
    name: Run Affected Tests
    runs-on: ubuntu-latest
    needs: quick-check
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Get changed files
        id: changed-files
        run: |
          echo "files=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | tr '\n' ' ')" >> $GITHUB_OUTPUT

      - name: Run API Tests
        run: npm run test -- --passWithNoTests
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          AUTH_SECRET: ${{ env.AUTH_SECRET }}
          NEXTAUTH_SECRET: ${{ env.NEXTAUTH_SECRET }}
          NODE_ENV: test

      - name: Test Summary
        if: always()
        run: |
          echo "## 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "API tests completed. Check the job logs for details." >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Job 4: Size Check
  # ============================================
  size-check:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    needs: quick-check
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build with bundle analysis
        run: npm run build
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          AUTH_SECRET: ${{ env.AUTH_SECRET }}
          NEXTAUTH_SECRET: ${{ env.NEXTAUTH_SECRET }}
          ANALYZE: true

      - name: Check build size
        run: |
          echo "## 📦 Bundle Size" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Build completed successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          du -sh .next/ >> $GITHUB_STEP_SUMMARY
